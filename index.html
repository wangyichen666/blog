---
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ site.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; }
    header { background: #2c3e50; color: #fff; padding: 2rem; text-align: center; }
    header h1 a { color: #fff; text-decoration: none; }
    nav { margin-top: 1rem; }
    nav a { color: #ecf0f1; margin: 0 1rem; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    main { max-width: 800px; margin: 3rem auto; padding: 0 1rem; }
    .post-list { list-style: none; }
    .post-list li { padding: 0.5rem 0; border-bottom: 1px solid #eee; display: flex; gap: 1rem; }
    .post-list a { color: #2c3e50; text-decoration: none; }
    .post-list a:hover { color: #3498db; }
    footer { text-align: center; padding: 2rem; color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">{{ site.title }}</a></h1>
    <nav>
      <a href="/">首页</a>
      <a href="/posts/">文章</a>
      <a href="/admin/">管理</a>
    </nav>
  </header>

  <main>
    <h2>欢迎访问我的博客</h2>
    <p>这是一个基于 Jekyll 和 Netlify CMS 的静态博客。</p>

    <h3>最新文章</h3>
    <ul class="post-list">
      {% for post in site.posts limit:5 %}
      <li>
        <span>{{ post.date | date: "%Y-%m-%d" }}</span>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </main>

  <footer>
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
  </footer>
</body>
</html>
