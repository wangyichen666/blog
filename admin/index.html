<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Content Manager | {{ site.title }}</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* 登录验证提示 */
    .auth-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .auth-overlay a { color: #667eea; }
  </style>
</head>
<body>
  <div id="authCheck" class="auth-overlay" style="display:none;">
    <div>
      <h2>请先登录</h2>
      <p><a href="/login.html">点击这里登录</a></p>
    </div>
  </div>

  <script>
    // 检查登录状态
    const auth = JSON.parse(localStorage.getItem('cms_auth') || 'null');
    if (!auth || new Date().getTime() >= auth.expires) {
      document.getElementById('authCheck').style.display = 'flex';
    } else {
      // 已登录，加载 Decap CMS
      var script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
