<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
    }
    h1 { text-align: center; color: #333; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; }
    input {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e1e1e1;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #667eea; }
    button {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    .error { color: #e74c3c; text-align: center; margin-top: 1rem; display: none; }
    .hint { text-align: center; color: #999; font-size: 0.85rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>管理员登录</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="password">访问密码</label>
        <input type="password" id="password" placeholder="请输入密码" required>
      </div>
      <button type="submit">登 录</button>
      <p class="error" id="errorMsg">密码错误，请重试</p>
    </form>
    <p class="hint">请使用管理员密码登录</p>
  </div>

  <script>
    // 简单密码验证（实际生产环境建议后端验证）
    const CORRECT_PASSWORD = 'admin123';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;

      if (password === CORRECT_PASSWORD) {
        // 存储登录状态（24小时有效）
        const expiresAt = new Date().getTime() + 24 * 60 * 60 * 1000;
        localStorage.setItem('cms_auth', JSON.stringify({ expires: expiresAt }));
        window.location.href = '/admin/';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });

    // 检查是否已登录
    window.onload = function() {
      const auth = JSON.parse(localStorage.getItem('cms_auth') || 'null');
      if (auth && new Date().getTime() < auth.expires) {
        window.location.href = '/admin/';
      }
    };
  </script>
</body>
</html>
