---
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>所有文章 - {{ site.title }}</title>
</head>
<body>
  <header>
    <h1><a href="/">{{ site.title }}</a></h1>
    <nav>
      <a href="/">首页</a>
      <a href="/posts/">文章</a>
      <a href="/admin/">管理</a>
    </nav>
  </header>

  <main>
    <h1>所有文章</h1>
    <ul class="post-list">
      {% for post in site.posts %}
      <li>
        <span>{{ post.date | date: "%Y-%m-%d" }}</span>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </main>
</body>
</html>
